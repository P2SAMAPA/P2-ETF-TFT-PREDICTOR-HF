name: Consensus Sweep (All Years)

on:
  schedule:
    - cron: "0 1 * * 2-6"    # 01:00 UTC = 8pm EST Mon–Fri
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 5  # Reduced to avoid HF rate limits
      matrix:
        year: [2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]  # Added 2026
        option: [a, b]
    env:
      HF_TOKEN:     ${{ secrets.HF_TOKEN }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements-training.txt
      - name: Run sweep for ${{ matrix.option }} ${{ matrix.year }}
        run: |
          SWEEP_DATE=$(date -u -d "-5 hours" +%Y%m%d 2>/dev/null || date -u +%Y%m%d)
          python train_pipeline.py --option ${{ matrix.option }} --start-year ${{ matrix.year }} --sweep-date $SWEEP_DATE
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.option }}-${{ matrix.year }}-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
