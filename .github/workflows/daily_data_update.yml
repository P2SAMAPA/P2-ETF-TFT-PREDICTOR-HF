name: Daily Data Update

on:
  schedule:
    - cron: "30 21 * * 1-5"   # 21:30 UTC Mon-Fri (after US market close)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-training.txt

      - name: Run incremental data update
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          import pandas as pd
          import time
          from datetime import datetime, timedelta
          from data_manager import fetch_etf_data, fetch_macro_data_robust, smart_update_hf_dataset
          from config import ALL_TICKERS

          token = os.getenv("HF_TOKEN")
          if not token:
              raise RuntimeError("HF_TOKEN not set")

          repo_id = "P2SAMAPA/my-etf-data"
          
          # FIXED: Removed space in URL
          raw_url = f"https://huggingface.co/datasets/{repo_id}/resolve/main/etf_data.csv?t={int(time.time())}"
          
          try:
              existing = pd.read_csv(raw_url)
              print(f"Loaded existing dataset: {len(existing)} rows")
          except Exception as e:
              print(f"ERROR loading dataset: {e}")
              raise RuntimeError(f"Failed to load HF dataset from {raw_url}: {e}")
          
          date_col = next((c for c in existing.columns if "date" in c.lower()), existing.columns[0])
          existing[date_col] = pd.to_datetime(existing[date_col])
          existing = existing.set_index(date_col).sort_index()
          
          # CRITICAL FIX: Check if last row has actual data, not just date index
          last_date = existing.index[-1].date()
          
          # Get ETF columns (those ending in _Ret, _MA20, _Vol)
          etf_data_cols = [c for c in existing.columns if any(c.endswith(suffix) for suffix in ['_Ret', '_MA20', '_Vol'])]
          
          if len(etf_data_cols) > 0:
              last_row_data = existing.iloc[-1][etf_data_cols]
              last_row_has_data = last_row_data.notna().any()  # True if ANY ETF has data
              print(f"Last row ({last_date}) has data in {last_row_data.notna().sum()}/{len(etf_data_cols)} ETF columns")
          else:
              last_row_has_data = False
              print("Warning: No ETF data columns found")
          
          today = datetime.now().date()

          # FIXED: If last row is empty (ghost row), re-fetch from that date
          if last_row_has_data:
              start_date = last_date + timedelta(days=1)
              print(f"Last row has data, fetching from next day: {start_date}")
          else:
              start_date = last_date  # Re-fetch the empty last date
              print(f"Last row is EMPTY (ghost row), re-fetching from: {start_date}")

          # FIXED: Better end_date logic - handle weekends properly
          # If today is Monday, we need Friday's data (yesterday is Sunday, no market)
          if today.weekday() == 0:  # Monday
              end_date = today - timedelta(days=3)  # Friday
          else:
              end_date = today - timedelta(days=1)

          print(f"Today: {today} ({today.strftime('%A')})")
          print(f"Will fetch from {start_date} to {end_date}")

          if start_date > end_date:
              print("No new trading days since last update.")
              exit(0)

          start_str = start_date.strftime("%Y-%m-%d")
          end_str = end_date.strftime("%Y-%m-%d")

          print(f"Fetching incremental data from {start_str} to {end_str}...")
          etf_data = fetch_etf_data(ALL_TICKERS, start_date=start_str, end_date=end_str)
          macro_data = fetch_macro_data_robust(start_date=start_str)
          
          print(f"ETF data rows: {len(etf_data)}, Macro data rows: {len(macro_data)}")
          
          if etf_data.empty and macro_data.empty:
              print("No new data found.")
              exit(0)

          new_df = pd.concat([etf_data, macro_data], axis=1)
          df = smart_update_hf_dataset(new_df, token, force_upload=False)
          print(f"Update complete. Dataset now has {len(df)} rows.")
          EOF

      - name: Done
        run: echo "✅ Daily data update complete"
