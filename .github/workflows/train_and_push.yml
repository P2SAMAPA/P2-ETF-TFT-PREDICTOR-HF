# .github/workflows/train_and_push.yml
# Two triggers:
#   1. train   — daily 7am EST (start_year=2016) + manual single-year
#   2. cleanup — daily midnight EST, wipes previous day's sweep cache

name: Daily TFT Training

on:
  schedule:
    - cron: "0 12 * * 1-5"   # 12:00 UTC = 7am EST Mon-Fri (single-year default)
    - cron: "0 0 * * 2-6"    # 00:00 UTC = 7pm EST Mon-Fri (wipe previous day's sweep)
  workflow_dispatch:
    inputs:
      start_year:
        description: "Start year for single-year run"
        required: false
        default: "2016"
        type: string
      force_refresh:
        description: "Force full dataset rebuild"
        required: false
        default: "false"
        type: boolean

jobs:

  # ── 7pm EST: wipe previous day sweep cache from HF dataset ─────────────────
  wipe_sweep_cache:
    if: >
      github.event_name == 'schedule' &&
      github.event.schedule == '0 0 * * 2-6'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Delete stale dated sweep files from HF dataset
        run: |
          pip install huggingface_hub -q
          python3 - <<'PYEOF'
          import os
          from datetime import datetime, timezone, timedelta
          from huggingface_hub import HfApi
          api   = HfApi()
          token = os.environ["HF_TOKEN"]
          repo  = "P2SAMAPA/p2-etf-tft-outputs"
          today = (datetime.now(timezone.utc) - timedelta(hours=5)).strftime("%Y%m%d")
          try:
              files = api.list_repo_files(repo_id=repo, repo_type="dataset", token=token)
          except Exception as e:
              print(f"Could not list files: {e}"); files = []
          deleted = 0
          # Delete stale sweep files for both options
          for prefix in ["sweep/option_a/signals_", "sweep/option_b/signals_"]:
              for f in files:
                  if f.startswith(prefix) and f.endswith(".json"):
                      parts = f.replace(".json","").split("_")
                      if len(parts) == 4:  # e.g. sweep/option_a/signals_2008_20260329
                          date_part = parts[3]
                          if date_part != today:
                              try:
                                  api.delete_file(path_in_repo=f, repo_id=repo,
                                      repo_type="dataset", token=token,
                                      commit_message=f"Wipe stale sweep: {f}")
                                  print(f"Deleted {f}"); deleted += 1
                              except Exception as e:
                                  print(f"Could not delete {f}: {e}")
          print(f"Wiped {deleted} stale sweep files")
          PYEOF

  # ── Single-year train for Option A ──────────────────────────────────────────
  train_a:
    if: >
      (github.event_name == 'schedule' &&
       github.event.schedule == '0 12 * * 1-5') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      HF_TOKEN:     ${{ secrets.HF_TOKEN }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt
      - name: Train Option A
        run: |
          START_YEAR="${{ github.event.inputs.start_year }}"
          START_YEAR="${START_YEAR:-2016}"
          ARGS="--start-year $START_YEAR"
          if [ "${{ github.event.inputs.force_refresh }}" = "true" ]; then
            ARGS="$ARGS --force-refresh"
          fi
          python train_pipeline.py --option a $ARGS
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-a-${{ github.run_id }}
          path: "*.log"
          retention-days: 7

  # ── Single-year train for Option B ──────────────────────────────────────────
  train_b:
    if: >
      (github.event_name == 'schedule' &&
       github.event.schedule == '0 12 * * 1-5') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      HF_TOKEN:     ${{ secrets.HF_TOKEN }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt
      - name: Train Option B
        run: |
          START_YEAR="${{ github.event.inputs.start_year }}"
          START_YEAR="${START_YEAR:-2016}"
          ARGS="--start-year $START_YEAR"
          if [ "${{ github.event.inputs.force_refresh }}" = "true" ]; then
            ARGS="$ARGS --force-refresh"
          fi
          python train_pipeline.py --option b $ARGS
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-b-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
